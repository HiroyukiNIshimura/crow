# Debian Nginx site config for Crow production
# Place this file as: /etc/nginx/sites-available/crow.conf
# and create symlink: /etc/nginx/sites-enabled/crow.conf

# --- upstream definition ---
# Replace 10.0.0.21 with Crow KVM instance private IP.
upstream crow_web_upstream {
    server 10.0.0.21:3000;
    keepalive 64;
}

upstream crow_api_upstream {
    server 10.0.0.21:3001;
    keepalive 64;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name crow.example.com;

    # For Let's Encrypt challenge
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name crow.example.com;

    # TLS cert paths (certbot default)
    ssl_certificate /etc/letsencrypt/live/crow.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/crow.example.com/privkey.pem;

    # Optional but recommended TLS settings
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # If you maintain this file, uncomment and point to the file generated by certbot/openssl.
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers (adjust CSP if you add external scripts/styles)
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # If everything is stable on HTTPS, you can enable HSTS.
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    client_max_body_size 10m;

    # --- API routing ---
    # /api/auth/login -> http://crow_api_upstream/auth/login (prefix /api is stripped)
    location /api/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        proxy_pass http://crow_api_upstream/;
    }

    # Normalize /api to /api/
    location = /api {
        return 301 /api/;
    }

    # --- Web routing (Next.js) ---
    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        proxy_pass http://crow_web_upstream;
    }
}
