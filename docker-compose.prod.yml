name: crow-prod

services:
  postgres:
    image: postgres:18-alpine
    container_name: crow_postgres_prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-crow}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}" ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - crow_network

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.prod
    image: crow-api:prod
    container_name: crow_api_prod
    user: "${CONTAINER_UID:-1000}:${CONTAINER_GID:-1000}"
    restart: unless-stopped
    env_file:
      - ${CROW_ENV_FILE:-.env}
    environment:
      NODE_ENV: production
      HOME: /tmp
      NPM_CONFIG_CACHE: /tmp/.npm
      API_PORT: ${API_PORT:-3001}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3000}
      DATABASE_URL: ${DATABASE_URL_DOCKER:-postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-crow}}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3001"
    ports:
      - "${API_PORT:-3001}:3001"
    networks:
      - crow_network

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
        NEXT_PUBLIC_SESSION_COOKIE_NAME: ${NEXT_PUBLIC_SESSION_COOKIE_NAME:-crow_session}
    image: crow-web:prod
    container_name: crow_web_prod
    user: "${CONTAINER_UID:-1000}:${CONTAINER_GID:-1000}"
    restart: unless-stopped
    env_file:
      - ${CROW_ENV_FILE:-.env}
    environment:
      NODE_ENV: production
      HOME: /tmp
      NPM_CONFIG_CACHE: /tmp/.npm
      WEB_PORT: ${WEB_PORT:-3000}
      API_URL_INTERNAL: ${API_URL_INTERNAL:-http://api:3001}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      NEXT_PUBLIC_SESSION_COOKIE_NAME: ${NEXT_PUBLIC_SESSION_COOKIE_NAME:-crow_session}
    depends_on:
      api:
        condition: service_started
    expose:
      - "3000"
    ports:
      - "${WEB_PORT:-3000}:3000"
    networks:
      - crow_network

networks:
  crow_network:
    driver: bridge

volumes:
  postgres_data:
